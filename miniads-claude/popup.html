<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px 18px 18px;
      font-family: 'Inter', 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #0f111a, #0b0c12);
      color: #f7f7f7;
      margin: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      margin-bottom: 16px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
    }

    .brand-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.3px;
    }

    .brand-sub {
      font-size: 12px;
      color: #cfd3df;
    }

    .cta {
      margin: 8px 0 0;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff9500;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 10px 30px rgba(255, 149, 0, 0.35);
    }
    button:hover {
      background: #ffb347;
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(255, 149, 0, 0.45);
    }
    button:active {
      background: #e88400;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="brand">
    <img src="logo.svg" alt="Miniads" class="brand-logo">
    <div class="brand-title">
      <div class="brand-name">Miniads</div>
      <div class="brand-sub">YouTube Thumbnail Preview</div>
    </div>
  </div>
  <div class="cta">
    <button id="openPreview">🎬 Ouvrir l'outil</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
