<div class="sidebar" part="sidebar">
  <header class="sidebar__header">
    <div class="sidebar__title-group">
      <span class="sidebar__logo">YT</span>
      <div>
        <p class="sidebar__title">Thumbnail Previewer</p>
        <p class="sidebar__subtitle">Pro Studio</p>
      </div>
    </div>
    <button class="sidebar__collapse" id="collapseToggle" aria-label="Réduire le panneau" aria-expanded="true">
      <span class="chevron chevron--left"></span>
    </button>
  </header>
  <div class="sidebar__body">
    <section class="panel panel--switch">
      <div class="switch-row">
        <label class="switch" for="toggleEnabled">
          <input type="checkbox" id="toggleEnabled" checked>
          <span class="switch__slider" aria-hidden="true"></span>
        </label>
        <span class="switch__label">Extension active</span>
      </div>
      <button class="btn btn--ghost" id="resetState">Reset</button>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Thumbnails</h2>
        <span class="panel__caption">Upload or generate</span>
      </div>
      <div class="thumb-upload">
        <label class="btn" for="fileInput">Upload image</label>
        <input type="file" id="fileInput" accept="image/*" hidden>
        <div class="thumb-or">ou</div>
        <div class="url-input">
          <input type="url" id="urlInput" placeholder="https://...">
          <button class="btn btn--ghost" id="applyUrl">Valider</button>
        </div>
      </div>
      <div class="thumb-preview" id="thumbPreview">
        <span class="thumb-preview__placeholder">16:9 Preview</span>
        <img alt="Preview" id="previewImage">
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Mode d'application</h2>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="applyMode" value="replace" checked> Replace</label>
        <label><input type="radio" name="applyMode" value="overlay"> Overlay</label>
      </div>
      <label class="slider-label" for="overlayOpacity">Opacity <span id="opacityValue">80%</span></label>
      <input type="range" min="0" max="100" value="80" id="overlayOpacity">
      <div class="radio-group radio-group--inline">
        <label><input type="radio" name="scopeMode" value="all" checked> All tiles</label>
        <label><input type="radio" name="scopeMode" value="first-row"> First row only</label>
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Ciblage</h2>
      </div>
      <div class="button-grid">
        <button class="btn" id="randomTile">Random localisation</button>
        <button class="btn" id="nextTile">Next random</button>
        <button class="btn btn--ghost" id="selectManual">Select manually</button>
        <button class="btn btn--ghost" id="pinTile">Pin this tile</button>
      </div>
      <p class="panel__info">Tile ciblée : <span id="tileIndicator">Aucune</span></p>
      <p class="panel__info">Tuiles affectées : <span id="countIndicator">0</span></p>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Titles</h2>
      </div>
      <div class="title-form">
        <input type="text" id="titleInput" placeholder="Your New Video Title">
        <button class="btn" id="addTitle">Add title</button>
      </div>
      <ul class="title-list" id="titleList" role="list">
      </ul>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Chaîne</h2>
      </div>
      <div class="channel-row">
        <span class="material-icon" aria-hidden="true">✏️</span>
        <input type="text" id="channelInput" placeholder="Nom de chaîne">
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <h2>Competition</h2>
      </div>
      <div class="pill-toggle">
        <button class="pill pill--active" id="pillYour" data-mode="your" aria-pressed="true">Your Video</button>
        <button class="pill" id="pillTrending" data-mode="trending" aria-pressed="false">Tendances</button>
      </div>
    </section>
  </div>
</div>
