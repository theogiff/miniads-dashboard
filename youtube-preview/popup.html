<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Miniads Preview</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Miniads Preview</h1>
    <label class="switch">
      <input type="checkbox" id="enabledToggle" />
      <span>Activer sur YouTube</span>
    </label>
    <a id="openYT" href="https://www.youtube.com" target="_blank" rel="noopener">Ouvrir YouTube</a>
    <p class="hint">Le bouton “Ajouter votre miniature” apparaît sur chaque tuile.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
